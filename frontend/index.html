<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7C9A7E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Soledad" />
    <title>BRENSO - Soledad</title>
    <meta
      name="description"
      content="BRENSO - Tu acompaniante de bienestar emocional. Powered by Soledad AI on Celo blockchain."
    />
    <script>
      (function () {
        try {
          if (localStorage.getItem('breso_theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              registrations.forEach((registration) => registration.unregister())
            })
          }
          if ('caches' in window) {
            caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)))
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
