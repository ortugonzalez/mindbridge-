<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7C9A7E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Soledad" />
    <title>BRENSO — Soledad</title>
  <meta name="description" content="BRENSO — Tu acompañante de bienestar emocional. Powered by Soledad AI on Celo blockchain.">
    <!-- Apply dark theme before React renders to prevent flash -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('breso_theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(() => {
            if ('Notification' in window && Notification.permission === 'default') {
              Notification.requestPermission();
            }
          });
        });
      }
    </script>
  </body>
</html>
