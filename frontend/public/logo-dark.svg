<svg viewBox="0 0 260 72" xmlns="http://www.w3.org/2000/svg">
  <!-- Human figure: circle head + open arms body -->
  <!-- Head -->
  <circle cx="28" cy="16" r="9" fill="#7C9A7E"/>
  <!-- Body -->
  <path d="M28 26 C28 26 28 48 28 52" 
        stroke="#7C9A7E" stroke-width="4" 
        stroke-linecap="round" fill="none"/>
  <!-- Left arm (slightly open, welcoming) -->
  <path d="M28 35 C22 31 16 30 12 32" 
        stroke="#7C9A7E" stroke-width="3.5" 
        stroke-linecap="round" fill="none"/>
  <!-- Right arm (slightly open, welcoming) -->
  <path d="M28 35 C34 31 40 30 44 32" 
        stroke="#7C9A7E" stroke-width="3.5" 
        stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <path d="M28 52 C24 58 22 64 21 68" 
        stroke="#7C9A7E" stroke-width="3.5" 
        stroke-linecap="round" fill="none"/>
  <path d="M28 52 C32 58 34 64 35 68" 
        stroke="#7C9A7E" stroke-width="3.5" 
        stroke-linecap="round" fill="none"/>
  <!-- Small heart/sprout at chest -->
  <circle cx="28" cy="38" r="3" fill="#A8C5A0"/>
  
  <!-- BRESO text -->
  <text x="60" y="38" 
        font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="700" 
        fill="#E8EDE8" letter-spacing="2">BRESO</text>
  <!-- por Soledad tagline -->
  <text x="62" y="56"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#7C9A7E" 
        letter-spacing="2" font-weight="400">
    por Soledad
  </text>
</svg>
