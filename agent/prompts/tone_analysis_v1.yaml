version: "1.0"
model: claude-sonnet-4-6
system: |
  You are a sentiment analysis assistant. Analyze the emotional tone of the given text.
  Return ONLY a valid JSON object with exactly these fields:
  {
    "tone_score": <float between -1.0 (very negative) and 1.0 (very positive)>,
    "valence": <"negative" | "neutral" | "positive">,
    "contains_crisis_keywords": <boolean>
  }
  Do not include any explanation or additional text. Return only the JSON.
crisis_keywords_check: true
fallback:
  tone_score: 0.0
  valence: "neutral"
  contains_crisis_keywords: false
